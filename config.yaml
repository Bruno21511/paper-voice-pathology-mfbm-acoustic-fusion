audio:
  sample_rate: 25000  # Informational only; actual value is loaded from the dataset
  normalize: peak
  trim_signal: True

features:
  n_fft: 4096
  n_filters: 20
  fmax: 4000
  overlap: 0.5
  frame_size_ms: 30
  hop_size_ms: 10
  edge_trim_frames: 3

acoustic_features:
  f0_min: 75
  f0_max: 400
  jitter_params: [0.0001, 0.02, 1.3]
  shimmer_window: 0.03
  shimmer_params: [1.3, 1.6]
  hnr_params: [0.01, 75, 0.1, 1.0]

data:
  # Dataset name used to build paths inside CORPORA_ROOT
  # (shared corpus directory located outside this repository)
  corpus_name: mysMEEI

data_cleaning:
  duplicate_subjects:
    - file: "JXS09AN.WAV"
      groups: ['UVFP', 'edema']

class_merging:
  # In the original paper, Reinke's edema and vocal nodules
  # were merged into a single 'physio' class
  groups_to_merge: ['edema', 'nodulo']
  merged_label: phlp

experiments:
  num_iters: 1000

  feature_sets:
    - acoustic
    - spectral
    - all

  tasks:
    Control_vs_PhLP:
      - control
      - phlp
    Control_vs_UVFP:
      - control
      - uvfp
    PhLP_vs_UVFP:
      - phlp
      - uvfp
    All_classes:
      null

results:
  figures_dir: results/figures
  metrics_dir: results/metrics